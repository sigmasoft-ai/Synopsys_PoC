# ============================================================
# DERIVED (VIEW-LEVEL) METRICS
# ============================================================
metrics:

  - name: payer_market_share_by_state
    synonyms: ["market share", "payer share", "payer market share percentage"]
    description: >
      Payer's share of total enrolled lives within a state.
      Formula: payer enrolled lives ÷ total state enrolled lives × 100.
      Use with STATE_CODE and PAYER_NAME dimensions.
    expr: >
      fact_state_enrolled_lives.total_state_enrolled_lives
      / NULLIF(SUM(fact_state_enrolled_lives.total_state_enrolled_lives) OVER (PARTITION BY fact_state_enrolled_lives.state_code), 0)
      * 100

  - name: clinic_covered_lives_pct
    synonyms: ["clinic coverage percentage", "clinic market penetration"]
    description: >
      Percentage of enrolled lives attributed to each clinic territory 
      out of total enrolled lives.
    expr: >
      fact_zip_enrolled_lives.total_enrolled_lives
      / NULLIF(SUM(fact_zip_enrolled_lives.total_enrolled_lives) OVER (), 0)
      * 100

  - name: autism_penetration_rate
    synonyms: ["autism coverage ratio", "autism lives covered vs estimated"]
    description: >
      Ratio of enrolled lives to estimated autism population (3.1% of total pop).
      Measures how much of the autism market ICBD is covering.
      Formula: enrolled lives ÷ (total population × 0.031) × 100
    expr: >
      fact_zip_enrolled_lives.total_enrolled_lives
      / NULLIF(fact_zip_pop_by_age.estimated_autism_population, 0)
      * 100


# ============================================================
# VERIFIED QUERIES (Onboarding + Business Use Cases)
# ============================================================
verified_queries:

  # ── Covered Lives ──────────────────────────────────────────

  - name: covered_lives_by_state
    question: "What are the total covered lives by state?"
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        s.STATE_NAME,
        f.STATE_CODE,
        SUM(f.ENROLLED_LIVES) AS TOTAL_ENROLLED_LIVES
      FROM FACT_STATE_ENROLLEDLIVES f
      JOIN DIM_STATE s ON f.STATE_CODE = s.STATE_CODE
      GROUP BY s.STATE_NAME, f.STATE_CODE
      ORDER BY TOTAL_ENROLLED_LIVES DESC;

  - name: covered_lives_by_payer_and_state
    question: "Show me covered lives broken down by payer and state."
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        s.STATE_NAME,
        p.PAYER_NAME,
        pp.PARENT_PAYER_NAME,
        SUM(f.ENROLLED_LIVES) AS ENROLLED_LIVES
      FROM FACT_STATE_ENROLLEDLIVES f
      JOIN DIM_STATE s ON f.STATE_CODE = s.STATE_CODE
      JOIN DIM_PAYERS p ON f.PAYER_ID = p.PAYER_ID
      LEFT JOIN DIM_PARENT_PAYER pp ON p.PARENT_PAYER_ID = pp.PARENT_PAYER_ID
      GROUP BY s.STATE_NAME, p.PAYER_NAME, pp.PARENT_PAYER_NAME
      ORDER BY s.STATE_NAME, ENROLLED_LIVES DESC;

  - name: covered_lives_by_clinic_territory
    question: "What are the total covered lives within each clinic's service territory?"
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        m.CLINIC_NAME,
        m.STATE_CODE,
        SUM(f.ENROLLED_LIVES) AS ENROLLED_LIVES,
        COUNT(DISTINCT f.ZIP_CODE) AS ZIP_COUNT
      FROM FACT_ZIP_ENROLLEDLIVES f
      JOIN MAP_CLINIC_TO_ZIP m ON f.ZIP_CODE = m.ZIP_CODE
      WHERE m.CLINIC_NAME IS NOT NULL
      GROUP BY m.CLINIC_NAME, m.STATE_CODE
      ORDER BY ENROLLED_LIVES DESC;

  - name: covered_lives_pct_by_state
    question: "What percentage of total covered lives does each state represent?"
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      WITH state_totals AS (
        SELECT
          STATE_CODE,
          SUM(ENROLLED_LIVES) AS STATE_LIVES
        FROM FACT_STATE_ENROLLEDLIVES
        GROUP BY STATE_CODE
      ),
      grand_total AS (
        SELECT SUM(ENROLLED_LIVES) AS TOTAL_LIVES FROM FACT_STATE_ENROLLEDLIVES
      )
      SELECT
        s.STATE_NAME,
        st.STATE_CODE,
        st.STATE_LIVES,
        ROUND(st.STATE_LIVES / gt.TOTAL_LIVES * 100, 2) AS PCT_OF_TOTAL
      FROM state_totals st
      JOIN DIM_STATE s ON st.STATE_CODE = s.STATE_CODE
      CROSS JOIN grand_total gt
      ORDER BY PCT_OF_TOTAL DESC;

  - name: covered_lives_by_county
    question: "Show covered lives by county."
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        f.STATE_CODE,
        f.COUNTY_NAME,
        SUM(f.ENROLLED_LIVES) AS ENROLLED_LIVES
      FROM FACT_COUNTY_ENROLLEDLIVES f
      GROUP BY f.STATE_CODE, f.COUNTY_NAME
      ORDER BY f.STATE_CODE, ENROLLED_LIVES DESC;

  - name: covered_lives_by_msa
    question: "What are covered lives by metro area (MSA)?"
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        f.STATE_CODE,
        f.MSA_NAME,
        SUM(f.ENROLLED_LIVES) AS ENROLLED_LIVES
      FROM FACT_MSA_ENROLLEDLIVES f
      GROUP BY f.STATE_CODE, f.MSA_NAME
      ORDER BY ENROLLED_LIVES DESC;

  # ── Market Share ──────────────────────────────────────────

  - name: payer_market_share_all_states
    question: "What is the market share of each payer across all states?"
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      WITH total_lives AS (
        SELECT SUM(ENROLLED_LIVES) AS GRAND_TOTAL
        FROM FACT_STATE_ENROLLEDLIVES
      ),
      payer_lives AS (
        SELECT
          p.PAYER_NAME,
          pp.PARENT_PAYER_NAME,
          SUM(f.ENROLLED_LIVES) AS PAYER_TOTAL
        FROM FACT_STATE_ENROLLEDLIVES f
        JOIN DIM_PAYERS p ON f.PAYER_ID = p.PAYER_ID
        LEFT JOIN DIM_PARENT_PAYER pp ON p.PARENT_PAYER_ID = pp.PARENT_PAYER_ID
        GROUP BY p.PAYER_NAME, pp.PARENT_PAYER_NAME
      )
      SELECT
        pl.PARENT_PAYER_NAME,
        pl.PAYER_NAME,
        pl.PAYER_TOTAL,
        ROUND(pl.PAYER_TOTAL / tl.GRAND_TOTAL * 100, 2) AS MARKET_SHARE_PCT
      FROM payer_lives pl
      CROSS JOIN total_lives tl
      ORDER BY MARKET_SHARE_PCT DESC;

  - name: top_3_payers_georgia
    question: "Who are the top 3 payers by enrolled lives in Georgia?"
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      WITH ga_total AS (
        SELECT SUM(ENROLLED_LIVES) AS GA_TOTAL
        FROM FACT_STATE_ENROLLEDLIVES
        WHERE STATE_CODE = 'GA'
      )
      SELECT
        p.PAYER_NAME,
        pp.PARENT_PAYER_NAME,
        SUM(f.ENROLLED_LIVES) AS ENROLLED_LIVES,
        ROUND(SUM(f.ENROLLED_LIVES) / gt.GA_TOTAL * 100, 2) AS MARKET_SHARE_PCT
      FROM FACT_STATE_ENROLLEDLIVES f
      JOIN DIM_PAYERS p ON f.PAYER_ID = p.PAYER_ID
      LEFT JOIN DIM_PARENT_PAYER pp ON p.PARENT_PAYER_ID = pp.PARENT_PAYER_ID
      CROSS JOIN ga_total gt
      WHERE f.STATE_CODE = 'GA'
      GROUP BY p.PAYER_NAME, pp.PARENT_PAYER_NAME, gt.GA_TOTAL
      ORDER BY ENROLLED_LIVES DESC
      LIMIT 3;

  - name: payer_market_share_by_state_detail
    question: "Show me payer market share for each state with payer rankings."
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      WITH state_payer AS (
        SELECT
          f.STATE_CODE,
          s.STATE_NAME,
          p.PAYER_NAME,
          pp.PARENT_PAYER_NAME,
          SUM(f.ENROLLED_LIVES) AS PAYER_STATE_LIVES
        FROM FACT_STATE_ENROLLEDLIVES f
        JOIN DIM_STATE s ON f.STATE_CODE = s.STATE_CODE
        JOIN DIM_PAYERS p ON f.PAYER_ID = p.PAYER_ID
        LEFT JOIN DIM_PARENT_PAYER pp ON p.PARENT_PAYER_ID = pp.PARENT_PAYER_ID
        GROUP BY f.STATE_CODE, s.STATE_NAME, p.PAYER_NAME, pp.PARENT_PAYER_NAME
      ),
      state_total AS (
        SELECT STATE_CODE, SUM(ENROLLED_LIVES) AS STATE_TOTAL
        FROM FACT_STATE_ENROLLEDLIVES
        GROUP BY STATE_CODE
      )
      SELECT
        sp.STATE_NAME,
        sp.STATE_CODE,
        sp.PARENT_PAYER_NAME,
        sp.PAYER_NAME,
        sp.PAYER_STATE_LIVES,
        ROUND(sp.PAYER_STATE_LIVES / st.STATE_TOTAL * 100, 2) AS MARKET_SHARE_PCT,
        RANK() OVER (PARTITION BY sp.STATE_CODE ORDER BY sp.PAYER_STATE_LIVES DESC) AS PAYER_RANK
      FROM state_payer sp
      JOIN state_total st ON sp.STATE_CODE = st.STATE_CODE
      ORDER BY sp.STATE_NAME, PAYER_RANK;

  - name: parent_payer_market_share
    question: "What is the market share by parent payer company (e.g., BCBS, UnitedHealth)?"
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      WITH grand_total AS (
        SELECT SUM(ENROLLED_LIVES) AS TOTAL FROM FACT_STATE_ENROLLEDLIVES
      )
      SELECT
        pp.PARENT_PAYER_NAME,
        SUM(f.ENROLLED_LIVES) AS TOTAL_LIVES,
        ROUND(SUM(f.ENROLLED_LIVES) / gt.TOTAL * 100, 2) AS MARKET_SHARE_PCT
      FROM FACT_STATE_ENROLLEDLIVES f
      JOIN DIM_PAYERS p ON f.PAYER_ID = p.PAYER_ID
      LEFT JOIN DIM_PARENT_PAYER pp ON p.PARENT_PAYER_ID = pp.PARENT_PAYER_ID
      CROSS JOIN grand_total gt
      GROUP BY pp.PARENT_PAYER_NAME, gt.TOTAL
      ORDER BY MARKET_SHARE_PCT DESC;

  # ── Autism Population Analysis ────────────────────────────

  - name: autism_estimate_by_state
    question: "What is the estimated autism population by state using the 3.1% national average?"
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        p.STATE_CODE,
        s.STATE_NAME,
        SUM(p.POPULATION) AS TOTAL_POPULATION,
        ROUND(SUM(p.POPULATION) * 0.031, 0) AS ESTIMATED_AUTISM_POPULATION
      FROM FACT_ZIP_POP_BY_AGE p
      JOIN DIM_STATE s ON p.STATE_CODE = s.STATE_CODE
      GROUP BY p.STATE_CODE, s.STATE_NAME
      ORDER BY ESTIMATED_AUTISM_POPULATION DESC;

  - name: autism_estimate_by_age_band
    question: "How many people with autism are estimated by age group?"
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        AGE_BAND,
        SUM(POPULATION) AS TOTAL_POPULATION,
        ROUND(SUM(POPULATION) * 0.031, 0) AS ESTIMATED_AUTISM_COUNT
      FROM FACT_ZIP_POP_BY_AGE
      GROUP BY AGE_BAND
      ORDER BY AGE_BAND;

  - name: autism_estimate_by_clinic_territory
    question: "What is the estimated autism population within each clinic's service territory?"
    use_as_onboarding_question: true
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        m.CLINIC_NAME,
        m.STATE_CODE,
        SUM(p.POPULATION) AS TOTAL_POPULATION,
        ROUND(SUM(p.POPULATION) * 0.031, 0) AS ESTIMATED_AUTISM_POPULATION
      FROM FACT_ZIP_POP_BY_AGE p
      JOIN MAP_CLINIC_TO_ZIP m ON p.ZIP_CODE = m.ZIP_CODE
      WHERE m.CLINIC_NAME IS NOT NULL
      GROUP BY m.CLINIC_NAME, m.STATE_CODE
      ORDER BY ESTIMATED_AUTISM_POPULATION DESC;

  - name: autism_estimate_by_age_and_state
    question: "Show the autism population estimate broken down by age band and state."
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        s.STATE_NAME,
        p.STATE_CODE,
        p.AGE_BAND,
        SUM(p.POPULATION) AS TOTAL_POPULATION,
        ROUND(SUM(p.POPULATION) * 0.031, 0) AS ESTIMATED_AUTISM_COUNT
      FROM FACT_ZIP_POP_BY_AGE p
      JOIN DIM_STATE s ON p.STATE_CODE = s.STATE_CODE
      GROUP BY s.STATE_NAME, p.STATE_CODE, p.AGE_BAND
      ORDER BY s.STATE_NAME, p.AGE_BAND;

  - name: autism_coverage_gap_by_state
    question: "How does the number of enrolled lives compare to the estimated autism population by state?"
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      WITH autism_pop AS (
        SELECT
          STATE_CODE,
          ROUND(SUM(POPULATION) * 0.031, 0) AS ESTIMATED_AUTISM_POP
        FROM FACT_ZIP_POP_BY_AGE
        GROUP BY STATE_CODE
      ),
      enrolled AS (
        SELECT
          STATE_CODE,
          SUM(ENROLLED_LIVES) AS ENROLLED_LIVES
        FROM FACT_STATE_ENROLLEDLIVES
        GROUP BY STATE_CODE
      )
      SELECT
        s.STATE_NAME,
        e.STATE_CODE,
        e.ENROLLED_LIVES,
        a.ESTIMATED_AUTISM_POP,
        a.ESTIMATED_AUTISM_POP - e.ENROLLED_LIVES AS COVERAGE_GAP,
        ROUND(e.ENROLLED_LIVES / NULLIF(a.ESTIMATED_AUTISM_POP, 0) * 100, 2) AS COVERAGE_PCT
      FROM enrolled e
      JOIN autism_pop a ON e.STATE_CODE = a.STATE_CODE
      JOIN DIM_STATE s ON e.STATE_CODE = s.STATE_CODE
      ORDER BY COVERAGE_GAP DESC;

  - name: autism_opportunity_by_county
    question: "Which counties have the highest autism opportunity (estimated autism population)?"
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      SELECT
        z.COUNTY_NAME,
        p.STATE_CODE,
        SUM(p.POPULATION) AS TOTAL_POPULATION,
        ROUND(SUM(p.POPULATION) * 0.031, 0) AS ESTIMATED_AUTISM_POP
      FROM FACT_ZIP_POP_BY_AGE p
      JOIN DIM_ZIP z ON p.ZIP_CODE = z.ZIP_CODE
      GROUP BY z.COUNTY_NAME, p.STATE_CODE
      ORDER BY ESTIMATED_AUTISM_POP DESC
      LIMIT 25;

  - name: bcab_to_autism_ratio_by_state
    question: "Compare BCAB authorization case volume to estimated autism population by state."
    verified_by: "ICBD Growth Analytics Team"
    sql: |
      WITH bcab AS (
        SELECT STATE_CODE, SUM(BCAB_COUNT) AS TOTAL_BCAB
        FROM FACT_BCAB_COUNTS
        GROUP BY STATE_CODE
      ),
      autism_pop AS (
        SELECT STATE_CODE, ROUND(SUM(POPULATION) * 0.031, 0) AS ESTIMATED_AUTISM
        FROM FACT_ZIP_POP_BY_AGE
        GROUP BY STATE_CODE
      )
      SELECT
        s.STATE_NAME,
        b.STATE_CODE,
        b.TOTAL_BCAB,
        a.ESTIMATED_AUTISM,
        ROUND(b.TOTAL_BCAB / NULLIF(a.ESTIMATED_AUTISM, 0) * 100, 2) AS BCAB_PENETRATION_PCT
      FROM bcab b
      JOIN autism_pop a ON b.STATE_CODE = a.STATE_CODE
      JOIN DIM_STATE s ON b.STATE_CODE = s.STATE_CODE
      ORDER BY BCAB_PENETRATION_PCT DESC;
